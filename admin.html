<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel | Mudassar Ali</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="New Project.svg">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:oklch(16% .014 335);
  --ink-2:oklch(20% .016 335);
  --ink-3:oklch(25% .018 335);
  --paper:oklch(95% .012 55);
  --soft:oklch(73% .014 345);
  --faint:oklch(55% .014 340);
  --line:oklch(31% .018 335);
  --accent:oklch(75% .14 44);
  --accent-deep:oklch(64% .15 40);
  --ok:oklch(73% .12 155);
  --err:oklch(65% .18 25);
  --ease:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--paper);font:400 15px/1.6 Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
h1,h2,h3{font-family:"Bricolage Grotesque",sans-serif;letter-spacing:-.04em;line-height:1}
a{color:inherit;text-decoration:none}
button,input,select{font:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px}

/* ===== LOGIN SCREEN ===== */
#loginScreen{
  position:fixed;inset:0;z-index:100;
  background:var(--ink);
  display:flex;align-items:center;justify-content:center;
  transition:opacity .5s var(--ease);
}
#loginScreen.hidden{opacity:0;pointer-events:none}
.login-box{
  width:min(400px,92vw);
  background:var(--ink-2);
  border:1px solid var(--line);
  border-radius:20px;
  padding:44px 40px;
}
.login-logo{
  width:40px;height:40px;background:var(--accent);
  border-radius:10px;transform:rotate(45deg);
  margin:0 auto 28px;
}
.login-box h2{text-align:center;font-size:1.7rem;margin-bottom:6px}
.login-box p{text-align:center;color:var(--soft);font-size:.85rem;margin-bottom:32px}
.field{display:grid;gap:6px;margin-bottom:16px}
.field label{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--soft)}
.field input{
  width:100%;border:0;border-bottom:1px solid var(--line);
  background:transparent;color:var(--paper);padding:11px 2px;outline:none;
  transition:border-color .2s;font-size:.95rem;
}
.field input:focus{border-color:var(--accent)}
.btn{
  width:100%;min-height:46px;border:0;border-radius:999px;
  background:var(--accent);color:var(--ink);font-weight:700;
  cursor:pointer;font-size:.95rem;margin-top:8px;
  transition:transform .25s var(--ease),background .25s;
}
.btn:hover{transform:translateY(-2px);background:var(--paper)}
.login-err{color:var(--err);font-size:.82rem;text-align:center;margin-top:12px;min-height:20px}

/* ===== ADMIN LAYOUT ===== */
#adminApp{display:none}
#adminApp.show{display:flex;flex-direction:column;min-height:100vh}

/* Top bar */
.topbar{
  position:sticky;top:0;z-index:50;
  background:oklch(16% .014 335/.95);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
  height:66px;display:flex;align-items:center;
  padding:0 32px;gap:20px;
}
.topbar-brand{font-family:"Bricolage Grotesque";font-size:1rem;font-weight:800;letter-spacing:.06em;display:flex;align-items:center;gap:10px}
.topbar-brand-mark{width:10px;height:10px;background:var(--accent);transform:rotate(45deg);border-radius:2px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.badge{background:var(--ink-3);border:1px solid var(--line);border-radius:999px;padding:5px 14px;font-size:.78rem;color:var(--soft)}
.badge b{color:var(--accent)}
.logout-btn{
  background:transparent;border:1px solid var(--line);border-radius:999px;
  padding:8px 18px;color:var(--soft);cursor:pointer;font-size:.8rem;
  transition:border-color .2s,color .2s;
}
.logout-btn:hover{border-color:var(--err);color:var(--err)}

/* Main content */
.admin-main{flex:1;padding:32px;max-width:1400px;margin:0 auto;width:100%}

/* Stats cards */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{
  background:var(--ink-2);border:1px solid var(--line);border-radius:14px;
  padding:22px 24px;
}
.stat-card .num{font-family:"Bricolage Grotesque";font-size:2.2rem;font-weight:700;color:var(--accent)}
.stat-card .lbl{color:var(--soft);font-size:.78rem;margin-top:4px}

/* Toolbar */
.toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:22px}
.toolbar input[type="text"]{
  flex:1;min-width:200px;
  border:1px solid var(--line);border-radius:999px;
  background:var(--ink-2);color:var(--paper);
  padding:10px 18px;outline:none;
  transition:border-color .2s;
}
.toolbar input[type="text"]:focus{border-color:var(--accent)}
.toolbar select{
  border:1px solid var(--line);border-radius:999px;
  background:var(--ink-2);color:var(--paper);
  padding:10px 18px;outline:none;cursor:pointer;
}
.toolbar select option{background:var(--ink-2)}
.tb-btn{
  border:1px solid var(--line);border-radius:999px;
  background:transparent;color:var(--soft);
  padding:10px 20px;cursor:pointer;font-size:.83rem;
  transition:border-color .2s,color .2s,background .2s;
}
.tb-btn:hover,.tb-btn.active{background:var(--paper);border-color:var(--paper);color:var(--ink)}
.tb-btn.danger{color:var(--err);border-color:var(--err)}
.tb-btn.danger:hover{background:var(--err);color:#fff;border-color:var(--err)}

/* Table */
.table-wrap{background:var(--ink-2);border:1px solid var(--line);border-radius:16px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{
  text-align:left;padding:14px 18px;
  font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--soft);border-bottom:1px solid var(--line);
  background:var(--ink-3);white-space:nowrap;
}
thead th input[type="checkbox"]{accent-color:var(--accent);width:16px;height:16px}
tbody tr{border-bottom:1px solid var(--line);transition:background .15s}
tbody tr:last-child{border-bottom:0}
tbody tr:hover{background:var(--ink-3)}
tbody td{padding:14px 18px;font-size:.84rem;vertical-align:top;max-width:220px}
tbody td.brief-cell{max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;color:var(--soft)}
tbody td.brief-cell:hover{color:var(--paper)}
tbody td input[type="checkbox"]{accent-color:var(--accent);width:16px;height:16px}
.service-badge{
  display:inline-block;padding:3px 10px;border-radius:999px;
  font-size:.67rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  background:var(--ink-3);border:1px solid var(--line);color:var(--soft);
}
.date-cell{color:var(--faint);font-size:.78rem;white-space:nowrap}
.email-link{color:var(--accent);font-size:.82rem}
.email-link:hover{text-decoration:underline}
.del-btn{
  background:transparent;border:0;color:var(--faint);
  cursor:pointer;font-size:1rem;padding:4px 8px;border-radius:6px;
  transition:color .2s,background .2s;
}
.del-btn:hover{color:var(--err);background:oklch(65% .18 25/.1)}

/* Empty / loading states */
.state-row td{text-align:center;padding:56px 24px;color:var(--soft)}
.spinner{
  width:32px;height:32px;border:3px solid var(--line);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Detail modal */
.detail-overlay{
  position:fixed;inset:0;z-index:200;
  background:oklch(8% .012 335/.92);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s var(--ease);
}
.detail-overlay.open{opacity:1;pointer-events:all}
.detail-box{
  background:var(--ink-2);border:1px solid var(--line);
  border-radius:18px;width:min(620px,94vw);
  max-height:90vh;overflow-y:auto;padding:36px;position:relative;
  transform:translateY(20px);transition:transform .35s var(--ease);
}
.detail-overlay.open .detail-box{transform:none}
.detail-close{
  position:absolute;top:16px;right:16px;
  width:38px;height:38px;border-radius:50%;
  border:1px solid var(--line);background:transparent;
  color:var(--paper);font-size:1.1rem;cursor:pointer;
  display:grid;place-items:center;transition:border-color .2s;
}
.detail-close:hover{border-color:var(--accent)}
.detail-box h3{font-size:1.5rem;margin-bottom:4px}
.detail-box .detail-date{color:var(--faint);font-size:.78rem;margin-bottom:24px}
.detail-row{display:grid;grid-template-columns:110px 1fr;gap:8px;padding:12px 0;border-bottom:1px solid var(--line)}
.detail-row:last-of-type{border-bottom:0}
.detail-row b{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);padding-top:2px}
.detail-brief{color:var(--soft);line-height:1.6;white-space:pre-wrap;word-break:break-word}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:22px;flex-wrap:wrap}
.page-btn{
  width:36px;height:36px;border-radius:8px;
  border:1px solid var(--line);background:transparent;
  color:var(--soft);cursor:pointer;font-size:.85rem;
  transition:border-color .2s,background .2s,color .2s;display:grid;place-items:center;
}
.page-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:var(--ink);font-weight:700}
.page-btn:disabled{opacity:.35;cursor:not-allowed}
.page-info{color:var(--faint);font-size:.8rem}

/* Toast */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:300;
  background:var(--ink-2);border:1px solid var(--line);
  border-radius:12px;padding:14px 22px;font-size:.85rem;
  transform:translateY(80px);opacity:0;
  transition:transform .3s var(--ease),opacity .3s;
  max-width:320px;pointer-events:none;
}
.toast.show{transform:none;opacity:1}
.toast.ok{border-color:var(--ok);color:var(--ok)}
.toast.err{border-color:var(--err);color:var(--err)}

/* Responsive */
@media(max-width:900px){
  .stats{grid-template-columns:1fr 1fr}
  .admin-main{padding:20px 16px}
  .topbar{padding:0 16px}
  tbody td{padding:10px 12px}
  thead th{padding:10px 12px}
}
@media(max-width:580px){
  .stats{grid-template-columns:1fr}
  .topbar-brand span{display:none}
}
</style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo"></div>
    <h2>Admin Panel</h2>
    <p>Mudassar Ali — Portfolio Dashboard</p>
    <div class="field">
      <label>Username</label>
      <input id="loginUser" type="text" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="loginPass" type="password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <button class="btn" id="loginBtn">Sign In →</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ===== ADMIN APP ===== -->
<div id="adminApp">

  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-brand">
      <span class="topbar-brand-mark"></span>
      <span>Mudassar Ali — Admin</span>
    </div>
    <div class="topbar-right">
      <div class="badge">Messages: <b id="totalCount">—</b></div>
      <div class="badge" id="todayBadge" style="display:none">Today: <b id="todayCount">0</b></div>
      <button class="logout-btn" id="logoutBtn">Sign Out</button>
    </div>
  </header>

  <!-- Main -->
  <main class="admin-main">

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card"><div class="num" id="statTotal">—</div><div class="lbl">Total Inquiries</div></div>
      <div class="stat-card"><div class="num" id="statToday">—</div><div class="lbl">Today</div></div>
      <div class="stat-card"><div class="num" id="statWeek">—</div><div class="lbl">This Week</div></div>
      <div class="stat-card"><div class="num" id="statService">—</div><div class="lbl">Top Service</div></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="🔍  Search by name, email, company…">
      <select id="serviceFilter">
        <option value="">All Services</option>
        <option value="Performance creative">Performance Creative</option>
        <option value="Product storytelling">Product Storytelling</option>
        <option value="Motion system">Motion System</option>
        <option value="Not sure yet">Not Sure Yet</option>
      </select>
      <button class="tb-btn" id="refreshBtn">↻ Refresh</button>
      <button class="tb-btn" id="exportBtn">⬇ Export CSV</button>
      <button class="tb-btn danger" id="deleteSelectedBtn" style="display:none">🗑 Delete Selected</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" id="selectAll" title="Select all"></th>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Company</th>
            <th>Service</th>
            <th>Budget</th>
            <th>Timeline</th>
            <th>Brief</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="state-row"><td colspan="11"><div class="spinner"></div><br><br>Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>

  </main>
</div>

<!-- Detail Modal -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-box">
    <button class="detail-close" id="detailClose">×</button>
    <h3 id="detailName"></h3>
    <div class="detail-date" id="detailDate"></div>
    <div class="detail-row"><b>Email</b><span id="detailEmail"></span></div>
    <div class="detail-row"><b>Company</b><span id="detailBrand"></span></div>
    <div class="detail-row"><b>Service</b><span id="detailService"></span></div>
    <div class="detail-row"><b>Budget</b><span id="detailBudget"></span></div>
    <div class="detail-row"><b>Timeline</b><span id="detailTimeline"></span></div>
    <div class="detail-row" style="grid-template-columns:1fr;gap:10px">
      <b>Project Brief</b>
      <p class="detail-brief" id="detailBrief"></p>
    </div>
    <div style="margin-top:24px;display:flex;gap:10px;flex-wrap:wrap">
      <a id="detailReplyBtn" href="#" class="btn" style="width:auto;padding:0 28px;min-height:42px;display:inline-flex;align-items:center;text-decoration:none">Reply via Email ↗</a>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===========================
// CONFIG
// ===========================
const SUPABASE_URL  = 'https://ftoaghmbibpkgkyonzbb.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0b2FnaG1iaWJwa2dreW9uemJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMTc4MzgsImV4cCI6MjA5OTU5MzgzOH0.KQowMR2Vt4MsbFnIJyneS7df0_zHzSrngyqcR5xpqB4';

// ⚠️  CHANGE THESE CREDENTIALS (username + password)
const ADMIN_USER = 'mudassar';
const ADMIN_PASS = 'Mudassar@2026';

const PER_PAGE = 15;

let sb, allRows = [], filtered = [], currentPage = 1, selected = new Set();

// ===========================
// SUPABASE INIT
// ===========================
function initSB() {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
}

// ===========================
// LOGIN
// ===========================
const loginScreen = document.getElementById('loginScreen');
const adminApp    = document.getElementById('adminApp');

function checkSession() {
  return sessionStorage.getItem('admin_auth') === 'ok';
}
function setSession() {
  sessionStorage.setItem('admin_auth','ok');
}
function clearSession() {
  sessionStorage.removeItem('admin_auth');
}

if (checkSession()) {
  loginScreen.classList.add('hidden');
  adminApp.classList.add('show');
  initSB();
  loadData();
}

document.getElementById('loginBtn').onclick = () => {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    errEl.textContent = '';
    setSession();
    loginScreen.classList.add('hidden');
    adminApp.classList.add('show');
    initSB();
    loadData();
  } else {
    errEl.textContent = '⚠ Incorrect username or password.';
  }
};

// Enter key on password
document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});
document.getElementById('loginUser').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginPass').focus();
});

document.getElementById('logoutBtn').onclick = () => {
  clearSession();
  location.reload();
};

// ===========================
// LOAD DATA
// ===========================
async function loadData() {
  setTableLoading();
  try {
    const { data, error } = await sb
      .from('contact_messages')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) throw error;
    allRows = data || [];
    applyFilters();
    updateStats();
  } catch (err) {
    showToast('Failed to load data: ' + err.message, 'err');
    document.getElementById('tableBody').innerHTML =
      `<tr class="state-row"><td colspan="11">❌ Could not load messages. Check Supabase connection.</td></tr>`;
  }
}

// ===========================
// STATS
// ===========================
function updateStats() {
  const total = allRows.length;
  const now   = new Date();
  const startOfDay  = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const startOfWeek = new Date(startOfDay); startOfWeek.setDate(startOfDay.getDate() - 7);

  const todayRows = allRows.filter(r => new Date(r.created_at) >= startOfDay);
  const weekRows  = allRows.filter(r => new Date(r.created_at) >= startOfWeek);

  // Top service
  const svcCounts = {};
  allRows.forEach(r => { if(r.service) svcCounts[r.service] = (svcCounts[r.service]||0)+1; });
  const topSvc = Object.entries(svcCounts).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statToday').textContent   = todayRows.length;
  document.getElementById('statWeek').textContent    = weekRows.length;
  document.getElementById('statService').textContent = topSvc ? topSvc[0].split(' ')[0] : '—';
  document.getElementById('totalCount').textContent  = total;

  if (todayRows.length) {
    document.getElementById('todayBadge').style.display = '';
    document.getElementById('todayCount').textContent   = todayRows.length;
  }
}

// ===========================
// FILTERS & SEARCH
// ===========================
let searchTerm = '', serviceFilter = '';

document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  currentPage = 1; applyFilters();
});
document.getElementById('serviceFilter').addEventListener('change', e => {
  serviceFilter = e.target.value;
  currentPage = 1; applyFilters();
});

function applyFilters() {
  filtered = allRows.filter(r => {
    const matchSearch = !searchTerm ||
      (r.name  ||'').toLowerCase().includes(searchTerm) ||
      (r.email ||'').toLowerCase().includes(searchTerm) ||
      (r.brand ||'').toLowerCase().includes(searchTerm) ||
      (r.brief ||'').toLowerCase().includes(searchTerm);
    const matchService = !serviceFilter || r.service === serviceFilter;
    return matchSearch && matchService;
  });
  selected.clear();
  updateDeleteBtn();
  renderTable();
  renderPagination();
}

// ===========================
// TABLE RENDER
// ===========================
function setTableLoading() {
  document.getElementById('tableBody').innerHTML =
    `<tr class="state-row"><td colspan="11"><div class="spinner"></div><br><br>Loading…</td></tr>`;
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const start = (currentPage-1)*PER_PAGE;
  const rows  = filtered.slice(start, start+PER_PAGE);

  if (!rows.length) {
    tbody.innerHTML = `<tr class="state-row"><td colspan="11">No messages found.</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map((r, i) => {
    const num    = start + i + 1;
    const date   = r.created_at ? new Date(r.created_at).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
    const time   = r.created_at ? new Date(r.created_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : '';
    const brief  = (r.brief||'').replace(/</g,'&lt;');
    const isChk  = selected.has(r.id) ? 'checked' : '';
    return `<tr>
      <td><input type="checkbox" class="row-chk" data-id="${r.id}" ${isChk}></td>
      <td style="color:var(--faint)">${num}</td>
      <td><b style="font-weight:600">${esc(r.name||'—')}</b></td>
      <td><a class="email-link" href="mailto:${esc(r.email||'')}">${esc(r.email||'—')}</a></td>
      <td>${esc(r.brand||'—')}</td>
      <td><span class="service-badge">${esc(r.service||'—')}</span></td>
      <td style="color:var(--accent);font-weight:600">${esc(r.budget||'—')}</td>
      <td style="color:var(--soft)">${esc(r.timeline||'—')}</td>
      <td class="brief-cell" onclick="openDetail(${JSON.stringify(r).split('"').join('&quot;')})" title="${esc(brief)}">${brief.slice(0,60)}${brief.length>60?'…':''}</td>
      <td class="date-cell">${date}<br><span style="color:var(--faint)">${time}</span></td>
      <td>
        <button class="del-btn" onclick="deleteRow('${r.id}')" title="Delete">🗑</button>
        <button class="del-btn" onclick='openDetail(${JSON.stringify(r)})' title="View" style="font-size:.9rem">👁</button>
      </td>
    </tr>`;
  }).join('');

  // Checkbox listeners
  tbody.querySelectorAll('.row-chk').forEach(chk => {
    chk.addEventListener('change', e => {
      const id = e.target.dataset.id;
      if (e.target.checked) selected.add(id); else selected.delete(id);
      updateDeleteBtn();
      document.getElementById('selectAll').checked = selected.size === rows.length;
    });
  });
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Select all
document.getElementById('selectAll').addEventListener('change', e => {
  const start = (currentPage-1)*PER_PAGE;
  const rows  = filtered.slice(start, start+PER_PAGE);
  rows.forEach(r => { e.target.checked ? selected.add(r.id) : selected.delete(r.id); });
  renderTable(); updateDeleteBtn();
});

function updateDeleteBtn() {
  const btn = document.getElementById('deleteSelectedBtn');
  btn.style.display = selected.size > 0 ? '' : 'none';
  btn.textContent = `🗑 Delete Selected (${selected.size})`;
}

// ===========================
// PAGINATION
// ===========================
function renderPagination() {
  const total = filtered.length;
  const pages = Math.ceil(total/PER_PAGE);
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML=''; return; }

  let html = `<span class="page-info">${total} results</span>`;
  html += `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>`;
  for (let i=1;i<=pages;i++) {
    if (pages>7 && i>2 && i<pages-1 && Math.abs(i-currentPage)>1) {
      if (i===3||i===pages-2) html+='<span style="color:var(--faint);padding:0 4px">…</span>';
      continue;
    }
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=pages?'disabled':''}>›</button>`;
  el.innerHTML = html;
}

function goPage(p) {
  const pages = Math.ceil(filtered.length/PER_PAGE);
  if (p<1||p>pages) return;
  currentPage = p;
  renderTable(); renderPagination();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ===========================
// DELETE
// ===========================
async function deleteRow(id) {
  if (!confirm('Delete this message?')) return;
  try {
    const { error } = await sb.from('contact_messages').delete().eq('id', id);
    if (error) throw error;
    allRows = allRows.filter(r => String(r.id) !== String(id));
    selected.delete(id);
    applyFilters(); updateStats();
    showToast('Message deleted.', 'ok');
  } catch (err) {
    showToast('Delete failed: ' + err.message, 'err');
  }
}

document.getElementById('deleteSelectedBtn').onclick = async () => {
  if (!selected.size) return;
  if (!confirm(`Delete ${selected.size} selected message(s)?`)) return;
  const ids = [...selected];
  try {
    const { error } = await sb.from('contact_messages').delete().in('id', ids);
    if (error) throw error;
    allRows = allRows.filter(r => !selected.has(r.id));
    selected.clear(); applyFilters(); updateStats();
    showToast(`${ids.length} message(s) deleted.`, 'ok');
  } catch (err) {
    showToast('Bulk delete failed: ' + err.message, 'err');
  }
};

// ===========================
// EXPORT CSV
// ===========================
document.getElementById('exportBtn').onclick = () => {
  const cols = ['id','name','brand','email','service','budget','timeline','brief','created_at'];
  const esc  = v => `"${String(v||'').replace(/"/g,'""')}"`;
  const rows = [cols.join(','), ...filtered.map(r => cols.map(c=>esc(r[c])).join(','))];
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `inquiries_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('CSV exported!', 'ok');
};

// ===========================
// REFRESH
// ===========================
document.getElementById('refreshBtn').onclick = () => loadData();

// ===========================
// DETAIL MODAL
// ===========================
const detailOverlay = document.getElementById('detailOverlay');

function openDetail(r) {
  if (typeof r === 'string') r = JSON.parse(r);
  document.getElementById('detailName').textContent    = r.name    || '—';
  document.getElementById('detailEmail').textContent   = r.email   || '—';
  document.getElementById('detailBrand').textContent   = r.brand   || '—';
  document.getElementById('detailService').textContent = r.service || '—';
  document.getElementById('detailBudget').textContent  = r.budget  || '—';
  document.getElementById('detailTimeline').textContent= r.timeline|| '—';
  document.getElementById('detailBrief').textContent   = r.brief   || '—';

  const d = r.created_at ? new Date(r.created_at).toLocaleString() : '';
  document.getElementById('detailDate').textContent = d;

  const subj = encodeURIComponent(`Re: Project inquiry from ${r.brand||r.name||''}`);
  const body = encodeURIComponent(`Hi ${r.name||''},\n\nThank you for reaching out!\n\n`);
  document.getElementById('detailReplyBtn').href = `mailto:${r.email||''}?subject=${subj}&body=${body}`;

  detailOverlay.classList.add('open');
}

function closeDetail() { detailOverlay.classList.remove('open'); }
document.getElementById('detailClose').onclick = closeDetail;
detailOverlay.addEventListener('click', e => { if(e.target===detailOverlay) closeDetail(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeDetail(); });

// ===========================
// TOAST NOTIFICATION
// ===========================
let toastTimer;
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
